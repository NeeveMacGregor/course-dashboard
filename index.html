<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#FAFAF7" />
<title>Course Dashboard</title>
<style>
  /* ===================================================================
     REPLACE the APPS_SCRIPT_URL constant below with your deployment URL
     =================================================================== */

  :root {
    --bg: #FAFAF7;
    --surface: #FFFFFF;
    --surface-alt: #F7F6F2;
    --border: rgba(0,0,0,0.15);
    --border-soft: rgba(0,0,0,0.1);
    --text: #2C2C2A;
    --text-muted: #5F5E5A;
    --text-faint: #888780;
    --blue: #185FA5;
    --blue-bg: #E6F1FB;
    --green: #085041;
    --green-bg: #E1F5EE;
    --amber: #633806;
    --amber-bg: #FAEEDA;
    --red: #791F1F;
    --red-bg: #FCEBEB;
    --purple: #3C3489;
    --purple-bg: #EEEDFE;
    --gray: #444441;
    --gray-bg: #F1EFE8;
  }

  * { box-sizing: border-box; }

  body {
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    margin: 0;
    padding: 1.5rem 1rem;
    line-height: 1.5;
  }

  .wrap { max-width: 1100px; margin: 0 auto; }

  .app-header {
    display: flex; align-items: baseline; justify-content: space-between;
    gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap;
  }
  .app-header h1 { font-size: 22px; font-weight: 500; margin: 0; }
  .app-header p { font-size: 13px; color: var(--text-muted); margin: 4px 0 0; }

  .save-status {
    font-size: 12px; color: var(--text-faint);
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 10px; border-radius: 6px; background: var(--surface-alt);
    min-width: 80px; justify-content: center;
  }
  .save-status.saving { color: var(--amber); }
  .save-status.saved { color: var(--green); }
  .save-status.error { color: var(--red); }

  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    background: transparent; color: var(--text);
    border: 0.5px solid var(--border); border-radius: 8px;
    padding: 8px 14px; font-size: 13px; font-weight: 500;
    cursor: pointer; font-family: inherit;
    transition: background 0.15s;
  }
  .btn:hover { background: var(--surface-alt); }
  .btn:disabled { opacity: 0.5; cursor: default; }
  .btn-sm { padding: 4px 10px; font-size: 12px; font-weight: 400; }
  .btn-xs { padding: 3px 8px; font-size: 11px; font-weight: 400; }
  .btn-danger { color: var(--red); border: none; }
  .btn-danger:hover { background: var(--red-bg); }

  .metrics {
    display: grid; grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 12px; margin-bottom: 1.5rem;
  }
  .metric { background: var(--surface-alt); border-radius: 8px; padding: 14px 16px; }
  .metric-label { font-size: 13px; color: var(--text-muted); }
  .metric-value { font-size: 24px; font-weight: 500; margin-top: 2px; }

  .courses { display: flex; flex-direction: column; gap: 10px; }

  .card {
    background: var(--surface); border: 0.5px solid var(--border);
    border-radius: 12px; overflow: hidden;
  }

  .card-header {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 16px; cursor: pointer;
  }
  .card-chevron { color: var(--text-muted); flex-shrink: 0; }
  .card-titles { flex: 1; min-width: 0; }
  .card-title-row {
    display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap;
  }
  .card-code { font-weight: 500; font-size: 15px; }
  .card-name { font-size: 14px; color: var(--gray); }
  .card-meta { font-size: 12px; color: var(--text-muted); margin-top: 3px; }

  .badge {
    font-size: 12px; font-weight: 500; padding: 3px 10px;
    border-radius: 8px; display: inline-flex; align-items: center; gap: 4px;
    white-space: nowrap;
  }
  .badge-stage-Planning   { background: var(--gray-bg);   color: var(--gray); }
  .badge-stage-Build      { background: var(--blue-bg);   color: var(--blue); }
  .badge-stage-Review     { background: var(--purple-bg); color: var(--purple); }
  .badge-stage-Pre-launch { background: var(--amber-bg);  color: var(--amber); }
  .badge-stage-Live       { background: var(--green-bg);  color: var(--green); }
  .badge-stage-Archived   { background: var(--gray-bg);   color: var(--text-muted); }

  .badge-status-On-track { background: var(--green-bg); color: var(--green); }
  .badge-status-At-risk  { background: var(--amber-bg); color: var(--amber); }
  .badge-status-Blocked  { background: var(--red-bg);   color: var(--red); }
  .badge-status-Done     { background: var(--purple-bg);color: var(--purple); }

  .progress-bar {
    width: 110px; height: 6px; background: var(--gray-bg);
    border-radius: 4px; overflow: hidden; flex-shrink: 0;
  }
  .progress-fill { height: 100%; background: #378ADD; transition: width 0.2s; }
  .progress-text { font-size: 12px; color: var(--text-muted); min-width: 30px; text-align: right; }

  .card-body {
    border-top: 0.5px solid var(--border);
    padding: 16px 16px 18px; background: var(--bg);
  }

  .panel {
    background: var(--surface); border: 0.5px solid var(--border);
    border-radius: 10px; padding: 12px 14px; margin-bottom: 14px;
  }
  .panel-header {
    display: flex; align-items: center; justify-content: space-between;
    gap: 10px; margin-bottom: 10px; flex-wrap: wrap;
  }
  .panel-title { font-size: 13px; font-weight: 500; }
  .panel-actions { display: flex; align-items: center; gap: 10px; }

  .tabs { display: flex; border-bottom: 0.5px solid var(--border); flex-wrap: wrap; }
  .tab {
    background: transparent; border: 0.5px solid transparent;
    border-bottom: 0.5px solid var(--border); border-radius: 8px 8px 0 0;
    padding: 7px 14px; font-size: 13px; color: var(--text-muted);
    cursor: pointer; font-family: inherit;
    display: inline-flex; align-items: center; gap: 5px;
    margin-bottom: -1px;
  }
  .tab.active {
    background: var(--surface); border: 0.5px solid var(--border);
    border-bottom: 0.5px solid var(--surface);
    font-weight: 500; color: var(--text);
  }
  .tab-content {
    background: var(--surface); border: 0.5px solid var(--border);
    border-top: none; border-radius: 0 0 10px 10px; padding: 14px;
  }

  .empty { font-size: 12px; color: var(--text-faint); font-style: italic; }

  .file-row {
    display: flex; align-items: center; gap: 10px; padding: 6px 8px;
    background: var(--surface-alt); border-radius: 6px; font-size: 12px;
  }
  .file-row-name { flex: 1; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .file-row-by { color: var(--text-muted); }
  .file-row-when { color: var(--text-faint); min-width: 90px; text-align: right; }

  .pin {
    background: var(--surface-alt); border-radius: 8px;
    padding: 10px 12px; margin-bottom: 10px;
  }
  .pin-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 6px; gap: 8px; flex-wrap: wrap;
  }
  .pin-label {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; font-weight: 500; color: var(--gray);
  }
  .pin-mode {
    font-size: 10px; color: var(--text-faint); font-weight: 400;
    background: var(--surface); padding: 1px 6px; border-radius: 3px;
  }
  .pin-body { font-size: 13px; color: var(--text); line-height: 1.5; }
  .pin-body .quote { font-style: italic; color: var(--gray); }
  .pin-body .value { font-size: 15px; font-weight: 500; }
  .pin-meta { font-size: 11px; color: var(--text-faint); margin-top: 6px; }
  .pin-error { font-size: 12px; color: var(--red); }
  .pin-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 4px; }
  .pin-table td { padding: 3px 6px; border: 0.5px solid var(--border-soft); }

  .pin-config {
    background: var(--surface-alt); border: 0.5px solid var(--border-soft);
    border-radius: 8px; padding: 10px; margin-bottom: 12px;
  }
  .pin-config-row {
    background: var(--surface); border: 0.5px solid var(--border-soft);
    border-radius: 6px; padding: 8px;
    display: grid; grid-template-columns: 1.2fr 1.5fr 0.9fr 1.3fr auto;
    gap: 6px; align-items: center; margin-bottom: 8px;
  }
  .pin-config-row:last-child { margin-bottom: 0; }
  .pin-config-row input,
  .pin-config-row select {
    padding: 5px 8px; border: 0.5px solid var(--border);
    border-radius: 4px; font-size: 12px; font-family: inherit;
    background: var(--surface); color: var(--text); width: 100%;
  }
  .pin-config-row .pin-heading-input {
    grid-column: 1 / -1; font-family: inherit;
  }
  .pin-config-row .mono { font-family: ui-monospace, "SF Mono", monospace; }
  .pin-config-row .icon-btn {
    background: transparent; border: none; padding: 4px; cursor: pointer;
    color: var(--text-faint); display: flex;
  }

  .fields-grid {
    display: grid; grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 12px; margin-bottom: 14px;
  }
  .fields-grid-2 {
    display: grid; grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 12px; margin-bottom: 14px;
  }
  .field-label { font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }
  .field-input, .field-select, .field-textarea {
    width: 100%; padding: 7px 10px; border: 0.5px solid rgba(0,0,0,0.2);
    border-radius: 8px; font-size: 13px; font-family: inherit;
    background: var(--surface); color: var(--text);
  }
  .field-textarea { resize: vertical; min-height: 52px; }
  input[type="range"] { width: 100%; }

  .tasks { display: flex; flex-direction: column; gap: 4px; }
  .task {
    display: flex; align-items: center; gap: 8px; padding: 6px 8px;
    background: var(--surface); border: 0.5px solid var(--border-soft);
    border-radius: 6px;
  }
  .task-check {
    background: transparent; border: none; padding: 0; cursor: pointer;
    display: flex; color: var(--text-faint);
  }
  .task-check.done { color: #1D9E75; }
  .task-text {
    flex: 1; border: none; background: transparent; font-size: 13px;
    padding: 2px 0; outline: none; font-family: inherit; color: var(--text);
  }
  .task-text.done { text-decoration: line-through; color: var(--text-faint); }
  .task-due {
    width: 110px; border: 0.5px solid var(--border-soft);
    border-radius: 4px; padding: 3px 6px; font-size: 12px;
    color: var(--text-muted); font-family: inherit;
  }
  .task-delete {
    background: transparent; border: none; padding: 4px; cursor: pointer;
    color: var(--text-faint); display: flex;
  }

  .section-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 8px;
  }
  .section-title { font-size: 13px; font-weight: 500; }

  .card-footer {
    display: flex; justify-content: flex-end;
    border-top: 0.5px solid var(--border-soft); padding-top: 10px; margin-top: 10px;
  }

  .inline-link {
    display: inline-flex; align-items: center; gap: 3px;
    font-size: 12px; color: var(--blue); text-decoration: none;
    margin-top: 6px;
  }
  .inline-link:hover { text-decoration: underline; }

  .canvas-summary {
    font-size: 13px; line-height: 1.6;
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
  }
  .canvas-summary strong { font-weight: 500; }
  .canvas-summary .label { color: var(--text-muted); }

  .spin { animation: spin 1s linear infinite; display: inline-block; }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  .icon { width: 14px; height: 14px; flex-shrink: 0; }
  .icon-sm { width: 12px; height: 12px; flex-shrink: 0; }

  .footer-note {
    margin-top: 1.5rem; font-size: 12px; color: var(--text-faint); text-align: center;
  }

  /* ============ MOBILE ============ */
  @media (max-width: 700px) {
    body { padding: 0.75rem; }
    .metrics { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .fields-grid, .fields-grid-2 { grid-template-columns: 1fr; }
    .card-header { flex-wrap: wrap; }
    .progress-bar { width: 80px; }
    .card-header .badge { font-size: 11px; padding: 2px 8px; }
    .pin-config-row { grid-template-columns: 1fr 1fr auto; }
    .pin-config-row input[type="text"]:nth-child(2),
    .pin-config-row select:nth-child(3),
    .pin-config-row input:nth-child(4) { grid-column: span 2; }
    .panel-header { flex-direction: column; align-items: flex-start; }
    .tabs { overflow-x: auto; flex-wrap: nowrap; -webkit-overflow-scrolling: touch; }
    .tab { flex-shrink: 0; }
    .canvas-summary { gap: 8px; }
    .file-row { flex-wrap: wrap; }
    .file-row-name { flex: 1 1 100%; }
    .task-due { width: 90px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header class="app-header">
    <div>
      <h1>Course dashboard</h1>
      <p>LXD project tracking · Drive + Canvas synthesis</p>
    </div>
    <div style="display: flex; align-items: center; gap: 10px; flex-wrap: wrap;">
      <span id="save-status" class="save-status">Loading…</span>
      <button id="add-course-btn" class="btn">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
        Add course
      </button>
    </div>
  </header>

  <div id="metrics" class="metrics"></div>
  <div id="courses" class="courses"></div>

  <div class="footer-note">
    Changes sync to Google Sheet · External data fetched on demand
  </div>
</div>

<script>
// =====================================================================
// CONFIG — paste your Apps Script Web App deployment URL here
// =====================================================================
var APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx8nPigWR5nLl8B0I0_2tWlEE13ufeQRyyz2c6veLHL95IY4jo4653lv6O6jilQzGoQ/exec";

// State
var state = {
  courses: [],
  expanded: {},       // courseId -> bool
  activeTab: {},      // courseId -> "canvas" | "folder" | "pinned"
  configuring: {},    // courseId -> bool
  refreshing: {},     // courseId -> bool
  lastRefresh: {},    // courseId -> time string
  externalData: {}    // courseId -> { canvas, drive, pins }
};

var STAGES = ["Planning", "Build", "Review", "Pre-launch", "Live", "Archived"];
var STATUSES = ["On track", "At risk", "Blocked", "Done"];

// Save debouncing — each course has its own pending save
var saveTimers = {};
var SAVE_DEBOUNCE_MS = 500;

// ---------- API ----------

function apiCall(params) {
  var url = APPS_SCRIPT_URL + "?" + Object.keys(params).map(function (k) {
    return encodeURIComponent(k) + "=" + encodeURIComponent(params[k]);
  }).join("&");
  return fetch(url).then(function (r) { return r.json(); });
}

function loadCourses() {
  setSaveStatus("loading", "Loading…");
  return apiCall({ action: "load" }).then(function (resp) {
    if (!resp.ok) throw new Error(resp.error);
    state.courses = resp.courses;
    // Default the first card open
    if (state.courses.length > 0) state.expanded[state.courses[0].id] = true;
    for (var i = 0; i < state.courses.length; i++) {
      state.activeTab[state.courses[i].id] = "canvas";
    }
    setSaveStatus("saved", "Loaded");
    render();
  }).catch(function (err) {
    setSaveStatus("error", "Load failed");
    alert("Could not load courses: " + err.message + "\n\nCheck your APPS_SCRIPT_URL.");
  });
}

function saveCourseDebounced(courseId) {
  if (saveTimers[courseId]) clearTimeout(saveTimers[courseId]);
  setSaveStatus("saving", "Saving…");
  saveTimers[courseId] = setTimeout(function () {
    var course = state.courses.find(function (c) { return c.id === courseId; });
    if (!course) return;
    apiCall({ action: "save", course: JSON.stringify(course) }).then(function (resp) {
      if (!resp.ok) throw new Error(resp.error);
      setSaveStatus("saved", "Saved");
    }).catch(function (err) {
      setSaveStatus("error", "Save failed");
      console.error("Save failed:", err);
    });
  }, SAVE_DEBOUNCE_MS);
}

function setSaveStatus(kind, text) {
  var el = document.getElementById("save-status");
  el.className = "save-status " + kind;
  el.textContent = text;
}

// ---------- Mutations ----------

function updateField(courseId, field, value) {
  var c = state.courses.find(function (c) { return c.id === courseId; });
  if (!c) return;
  c[field] = value;
  saveCourseDebounced(courseId);
  render();
}

function addCourse() {
  var newCourse = {
    id: "c" + Date.now(),
    code: "NEW 0000", title: "New course", faculty: "",
    stage: "Planning", status: "On track", platform: "Canvas",
    startDate: "", targetLaunch: "", progress: 0, notes: "",
    driveFolderId: "", canvasCourseId: "", pins: [], tasks: []
  };
  state.courses.push(newCourse);
  state.expanded[newCourse.id] = true;
  state.activeTab[newCourse.id] = "canvas";
  saveCourseDebounced(newCourse.id);
  render();
}

function deleteCourse(courseId) {
  var c = state.courses.find(function (cc) { return cc.id === courseId; });
  if (!c) return;
  if (!confirm("Delete " + c.code + "?")) return;
  apiCall({ action: "delete", id: courseId }).then(function (resp) {
    if (!resp.ok) { alert("Delete failed: " + resp.error); return; }
    state.courses = state.courses.filter(function (cc) { return cc.id !== courseId; });
    setSaveStatus("saved", "Saved");
    render();
  });
}

function addTask(courseId) {
  var c = state.courses.find(function (cc) { return cc.id === courseId; });
  if (!c) return;
  c.tasks.push({ id: "t" + Date.now(), text: "New task", done: false, due: "" });
  saveCourseDebounced(courseId);
  render();
}

function updateTask(courseId, taskId, field, value) {
  var c = state.courses.find(function (cc) { return cc.id === courseId; });
  if (!c) return;
  var t = c.tasks.find(function (tt) { return tt.id === taskId; });
  if (!t) return;
  t[field] = value;
  saveCourseDebounced(courseId);
  render();
}

function deleteTask(courseId, taskId) {
  var c = state.courses.find(function (cc) { return cc.id === courseId; });
  if (!c) return;
  c.tasks = c.tasks.filter(function (tt) { return tt.id !== taskId; });
  saveCourseDebounced(courseId);
  render();
}

function addPin(courseId) {
  var c = state.courses.find(function (cc) { return cc.id === courseId; });
  if (!c) return;
  if (c.pins.length >= 3) { alert("Maximum 3 pins per course to keep refresh times fast."); return; }
  c.pins.push({
    id: "p" + Date.now(), label: "New pin", fileId: "",
    type: "doc", mode: "firstParagraph", heading: "", cell: ""
  });
  saveCourseDebounced(courseId);
  render();
}

function updatePin(courseId, pinId, field, value) {
  var c = state.courses.find(function (cc) { return cc.id === courseId; });
  if (!c) return;
  var p = c.pins.find(function (pp) { return pp.id === pinId; });
  if (!p) return;
  p[field] = value;
  saveCourseDebounced(courseId);
  render();
}

function deletePin(courseId, pinId) {
  var c = state.courses.find(function (cc) { return cc.id === courseId; });
  if (!c) return;
  c.pins = c.pins.filter(function (pp) { return pp.id !== pinId; });
  saveCourseDebounced(courseId);
  render();
}

// ---------- Refresh ----------

function refreshCourse(courseId) {
  var c = state.courses.find(function (cc) { return cc.id === courseId; });
  if (!c) return;
  if (!c.driveFolderId && !c.canvasCourseId && c.pins.length === 0) {
    alert("Add a Drive folder ID, Canvas course ID, or at least one pinned file first.");
    return;
  }

  state.refreshing[courseId] = true;
  render();

  var calls = [];
  var data = { canvas: null, drive: null, pins: [] };

  if (c.canvasCourseId) {
    calls.push(apiCall({ action: "refreshCanvas", canvasCourseId: c.canvasCourseId })
      .then(function (r) { data.canvas = r.ok ? r.data : { ok: false, error: r.error }; }));
  }
  if (c.driveFolderId) {
    calls.push(apiCall({ action: "refreshDrive", driveFolderId: c.driveFolderId })
      .then(function (r) { data.drive = r.ok ? r.data : { ok: false, error: r.error }; }));
  }
  if (c.pins.length > 0) {
    calls.push(apiCall({ action: "refreshPins", pins: JSON.stringify(c.pins) })
      .then(function (r) { data.pins = r.ok ? r.data : []; }));
  }

  Promise.all(calls).then(function () {
    state.externalData[courseId] = data;
    state.refreshing[courseId] = false;
    var now = new Date();
    state.lastRefresh[courseId] = now.getHours().toString().padStart(2, "0") + ":" + now.getMinutes().toString().padStart(2, "0");
    render();
  }).catch(function (err) {
    state.refreshing[courseId] = false;
    alert("Refresh failed: " + err.message);
    render();
  });
}

// ---------- Render ----------

function esc(s) {
  if (s === null || s === undefined) return "";
  return String(s).replace(/[&<>"']/g, function (m) {
    return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[m];
  });
}

function slug(s) { return String(s || "").replace(/\s+/g, "-"); }

function svgIcon(path, cls) {
  return '<svg class="' + (cls || "icon-sm") + '" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' + path + '</svg>';
}
var ICONS = {
  chevronDown: '<polyline points="6 9 12 15 18 9"/>',
  chevronRight: '<polyline points="9 18 15 12 9 6"/>',
  plus: '<path d="M12 5v14M5 12h14"/>',
  trash: '<polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/>',
  check: '<polyline points="20 6 9 17 4 12"/>',
  circle: '<circle cx="12" cy="12" r="9"/>',

  alertCircle: '<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>',

function render() {
  renderMetrics();
  renderCourses();
}

function renderMetrics() {
  var activeCount = state.courses.filter(function (c) { return c.stage !== "Archived" && c.stage !== "Live"; }).length;
  var atRiskCount = state.courses.filter(function (c) { return c.status === "At risk" || c.status === "Blocked"; }).length;
  var openTasks = state.courses.reduce(function (s, c) { return s + c.tasks.filter(function (t) { return !t.done; }).length; }, 0);
  var avgProgress = state.courses.length ? Math.round(state.courses.reduce(function (s, c) { return s + (c.progress || 0); }, 0) / state.courses.length) : 0;

  var metrics = [
    { label: "Active courses", value: activeCount },
    { label: "At risk / blocked", value: atRiskCount },
    { label: "Open tasks", value: openTasks },
    { label: "Avg progress", value: avgProgress + "%" }
  ];
  document.getElementById("metrics").innerHTML = metrics.map(function (m) {
    return '<div class="metric"><div class="metric-label">' + esc(m.label) + '</div><div class="metric-value">' + esc(m.value) + '</div></div>';
  }).join("");
}

function renderCourses() {
  var html = state.courses.map(renderCourseCard).join("");
  document.getElementById("courses").innerHTML = html;
  wireCardEvents();
}

function renderCourseCard(c) {
  var expanded = !!state.expanded[c.id];
  var doneTasks = c.tasks.filter(function (t) { return t.done; }).length;
  var tab = state.activeTab[c.id] || "canvas";

  var pinsText = c.pins.length > 0 ? " · " + c.pins.length + " pinned" : "";
  var faculty = c.faculty ? esc(c.faculty) + " · " : "";

  var header = '' +
    '<div class="card-header" data-action="toggle" data-course-id="' + c.id + '">' +
      svgIcon(expanded ? ICONS.chevronDown : ICONS.chevronRight, "icon card-chevron") +
      '<div class="card-titles">' +
        '<div class="card-title-row">' +
          '<span class="card-code">' + esc(c.code) + '</span>' +
          '<span class="card-name">' + esc(c.title) + '</span>' +
        '</div>' +
        '<div class="card-meta">' + faculty + esc(c.platform) + ' · ' + doneTasks + '/' + c.tasks.length + ' tasks' + pinsText + '</div>' +
      '</div>' +
      '<span class="badge badge-stage-' + slug(c.stage) + '">' + esc(c.stage) + '</span>' +
      '<span class="badge badge-status-' + slug(c.status) + '">' + esc(c.status) + '</span>' +
      '<div class="progress-bar"><div class="progress-fill" style="width: ' + (c.progress || 0) + '%"></div></div>' +
      '<span class="progress-text">' + (c.progress || 0) + '%</span>' +
    '</div>';

  if (!expanded) return '<div class="card">' + header + '</div>';

  var body = renderCardBody(c, tab);
  return '<div class="card">' + header + body + '</div>';
}

function renderCardBody(c, tab) {
  return '' +
    '<div class="card-body">' +
      renderExternalPanel(c, tab) +
      renderFieldsGrid(c) +
      renderSourceIds(c) +
      renderNotes(c) +
      renderTasks(c) +
      '<div class="card-footer">' +
        '<button class="btn btn-sm btn-danger" data-action="delete-course" data-course-id="' + c.id + '">' +
          svgIcon(ICONS.trash) + ' Delete course</button>' +
      '</div>' +
    '</div>';
}

function renderExternalPanel(c, tab) {
  var refreshing = !!state.refreshing[c.id];
  var lastRefresh = state.lastRefresh[c.id];

  var tabButtons = ''  +
    '<div class="tabs">' +
      '<button class="tab ' + (tab === "canvas" ? "active" : "") + '" data-action="set-tab" data-course-id="' + c.id + '" data-tab="canvas">' +
        svgIcon(ICONS.book) + ' Canvas</button>' +
      '<button class="tab ' + (tab === "folder" ? "active" : "") + '" data-action="set-tab" data-course-id="' + c.id + '" data-tab="folder">' +
        svgIcon(ICONS.folder) + ' Folder activity</button>' +
      '<button class="tab ' + (tab === "pinned" ? "active" : "") + '" data-action="set-tab" data-course-id="' + c.id + '" data-tab="pinned">' +
        svgIcon(ICONS.pin) + ' Pinned' + (c.pins.length > 0 ? ' (' + c.pins.length + ')' : '') + '</button>' +
    '</div>';

  var content = '';
  if (tab === "canvas")  content = renderCanvasTab(c);
  if (tab === "folder")  content = renderFolderTab(c);
  if (tab === "pinned")  content = renderPinnedTab(c);

  return '' +
    '<div style="margin-bottom: 14px;">' +
      '<div class="panel-header" style="margin-bottom: 10px;">' +
        '<div class="panel-title">External data</div>' +
        '<div class="panel-actions">' +
          (lastRefresh ? '<span style="font-size: 11px; color: var(--text-faint);">Last refresh ' + esc(lastRefresh) + '</span>' : '') +
          '<button class="btn btn-sm" data-action="refresh" data-course-id="' + c.id + '" ' + (refreshing ? 'disabled' : '') + '>' +
            '<span class="' + (refreshing ? 'spin' : '') + '">' + svgIcon(ICONS.refresh) + '</span>' +
            ' ' + (refreshing ? 'Refreshing' : 'Refresh') + '</button>' +
        '</div>' +
      '</div>' +
      tabButtons +
      '<div class="tab-content">' + content + '</div>' +
    '</div>';
}

function renderCanvasTab(c) {
  var data = state.externalData[c.id] && state.externalData[c.id].canvas;
  if (!data) return '<div class="empty">' + (c.canvasCourseId ? 'Click Refresh to pull latest from Canvas.' : 'Add a Canvas course ID below, then Refresh.') + '</div>';
  if (!data.ok) return '<div class="empty" style="color: var(--red);">Canvas error: ' + esc(data.error) + '</div>';
  var publishColor = data.coursePublished ? 'var(--green)' : 'var(--amber)';
  return '' +
    '<div class="canvas-summary">' +
      '<div><span class="label">Modules:</span> <strong>' + data.publishedModules + '/' + data.totalModules + '</strong> published</div>' +
      '<div><span class="label">Status:</span> <span style="color: ' + publishColor + '; font-weight: 500;">' + (data.coursePublished ? 'published' : 'unpublished') + '</span></div>' +
      '<div><span class="label">Last activity:</span> ' + esc(data.lastActivity) + '</div>' +
    '</div>' +
    '<a class="inline-link" href="' + esc(data.courseUrl) + '" target="_blank" rel="noopener">Open in Canvas ' + svgIcon(ICONS.external) + '</a>';
}

function renderFolderTab(c) {
  var data = state.externalData[c.id] && state.externalData[c.id].drive;
  if (!data) return '<div class="empty">' + (c.driveFolderId ? 'Click Refresh to pull folder activity.' : 'Add a Drive folder ID below, then Refresh.') + '</div>';
  if (!data.ok) return '<div class="empty" style="color: var(--red);">Drive error: ' + esc(data.error) + '</div>';
  var filesHtml = data.recentFiles.map(function (f) {
    return '<div class="file-row">' + svgIcon(ICONS.file) +
      '<span class="file-row-name">' + esc(f.name) + '</span>' +
      '<span class="file-row-by">' + esc(f.by) + '</span>' +
      '<span class="file-row-when">' + esc(f.modified) + '</span></div>';
  }).join("");
  return '' +
    '<div style="font-size: 12px; color: var(--text-muted); margin-bottom: 8px;">' + data.fileCount + ' files total · 5 most recent:</div>' +
    '<div style="display: flex; flex-direction: column; gap: 4px;">' + filesHtml + '</div>' +
    '<a class="inline-link" href="' + esc(data.folderUrl) + '" target="_blank" rel="noopener">Open folder ' + svgIcon(ICONS.external) + '</a>';
}

function renderPinnedTab(c) {
  var configuring = !!state.configuring[c.id];
  var header = '' +
    '<div class="section-header">' +
      '<div style="font-size: 12px; color: var(--text-muted);">' + c.pins.length + ' of 3 pins</div>' +
      '<button class="btn btn-xs" data-action="toggle-config" data-course-id="' + c.id + '">' +
        svgIcon(ICONS.settings) + ' ' + (configuring ? 'Done' : 'Configure pins') + '</button>' +
    '</div>';

  var configEditor = configuring ? renderPinConfig(c) : '';

  var results = '';
  if (c.pins.length === 0 && !configuring) {
    results = '<div class="empty">No pinned files. Click Configure pins to add up to 3.</div>';
  } else {
    var pinData = state.externalData[c.id] && state.externalData[c.id].pins;
    if (pinData && pinData.length > 0) {
      results = pinData.map(renderPinResult).join("");
    } else if (!configuring) {
      results = '<div class="empty">Click Refresh to pull latest from pinned files.</div>';
    }
  }

  return header + configEditor + results;
}

function renderPinConfig(c) {
  if (c.pins.length === 0) {
    return '<div class="pin-config">' +
      '<div class="empty" style="padding: 4px 0;">No pins yet. Add one below.</div>' +
      '<button class="btn btn-sm" data-action="add-pin" data-course-id="' + c.id + '">' + svgIcon(ICONS.plus) + ' Add pin</button>' +
    '</div>';
  }

  var rows = c.pins.map(function (p) {
    var modeOrCell = '';
    if (p.type === "doc") {
      modeOrCell = '<select data-action="update-pin" data-course-id="' + c.id + '" data-pin-id="' + p.id + '" data-field="mode">' +
        '<option value="heading"' + (p.mode === "heading" ? " selected" : "") + '>Specific heading</option>' +
        '<option value="firstParagraph"' + (p.mode === "firstParagraph" ? " selected" : "") + '>First paragraph</option>' +
        '<option value="headings"' + (p.mode === "headings" ? " selected" : "") + '>Headings list</option>' +
      '</select>';
    } else {
      var ph = p.type === "sheet-cell" ? "B2" : "A2:C10";
      modeOrCell = '<input class="mono" type="text" data-action="update-pin" data-course-id="' + c.id + '" data-pin-id="' + p.id + '" data-field="cell" value="' + esc(p.cell || "") + '" placeholder="' + ph + '" />';
    }

    var headingInput = (p.type === "doc" && p.mode === "heading") ?
      '<input class="pin-heading-input" type="text" data-action="update-pin" data-course-id="' + c.id + '" data-pin-id="' + p.id + '" data-field="heading" value="' + esc(p.heading || "") + '" placeholder="Heading to pull (e.g. Learning Objectives)" />' : '';

    return '<div class="pin-config-row">' +
      '<input type="text" data-action="update-pin" data-course-id="' + c.id + '" data-pin-id="' + p.id + '" data-field="label" value="' + esc(p.label || "") + '" placeholder="Label" />' +
      '<input class="mono" type="text" data-action="update-pin" data-course-id="' + c.id + '" data-pin-id="' + p.id + '" data-field="fileId" value="' + esc(p.fileId || "") + '" placeholder="File ID" />' +
      '<select data-action="update-pin" data-course-id="' + c.id + '" data-pin-id="' + p.id + '" data-field="type">' +
        '<option value="doc"' + (p.type === "doc" ? " selected" : "") + '>Doc</option>' +
        '<option value="sheet-cell"' + (p.type === "sheet-cell" ? " selected" : "") + '>Sheet cell</option>' +
        '<option value="sheet-range"' + (p.type === "sheet-range" ? " selected" : "") + '>Sheet range</option>' +
      '</select>' +
      modeOrCell +
      '<button class="icon-btn" data-action="delete-pin" data-course-id="' + c.id + '" data-pin-id="' + p.id + '">' + svgIcon(ICONS.trash) + '</button>' +
      headingInput +
    '</div>';
  }).join("");

  var addBtn = '<button class="btn btn-sm" data-action="add-pin" data-course-id="' + c.id + '"' + (c.pins.length >= 3 ? " disabled" : "") + '>' + svgIcon(ICONS.plus) + ' Add pin</button>';

  return '<div class="pin-config">' + rows + '<div style="margin-top: 8px;">' + addBtn + '</div></div>';
}

function renderPinResult(p) {
  var r = p.result;
  var iconPath = p.type === "doc" ? ICONS.file : ICONS.sheet;
  var modeText;
  if (p.type === "doc") {
    if (p.mode === "heading") modeText = "heading: " + (p.heading || "—");
    else if (p.mode === "headings") modeText = "headings list";
    else modeText = "first paragraph";
  } else if (p.type === "sheet-cell") {
    modeText = "cell " + (p.cell || "—");
  } else {
    modeText = "range " + (p.cell || "—");
  }

  var body = '';
  if (r && r.ok) {
    if (r.content) body += '<div class="quote">"' + esc(r.content) + '"</div>';
    if (r.headings) {
      body += '<ul style="margin: 4px 0; padding-left: 18px; color: var(--gray);">' +
        r.headings.map(function (h) { return '<li style="font-size: 12px;">' + esc(h) + '</li>'; }).join("") + '</ul>';
    }
    if (r.value !== undefined && r.value !== null) body += '<div class="value">' + esc(r.value) + '</div>';
    if (r.table) {
      body += '<table class="pin-table">' + r.table.map(function (row) {
        return '<tr>' + row.map(function (cell) { return '<td>' + esc(cell) + '</td>'; }).join("") + '</tr>';
      }).join("") + '</table>';
    }
    body += '<div class="pin-meta">Modified ' + esc(r.modified) + (r.by ? ' by ' + esc(r.by) : '') + '</div>';
  } else if (r && !r.ok) {
    body = '<div class="pin-error">Error: ' + esc(r.error || "could not fetch") + '</div>';
  } else {
    body = '<div class="empty">Not refreshed yet.</div>';
  }

  var link = (r && r.url) ? '<a class="inline-link" style="margin: 0; font-size: 11px;" href="' + esc(r.url) + '" target="_blank" rel="noopener">Open ' + svgIcon(ICONS.external) + '</a>' : '';

  return '<div class="pin">' +
    '<div class="pin-header">' +
      '<div class="pin-label">' + svgIcon(iconPath) + ' ' + esc(p.label) + ' <span class="pin-mode">' + esc(modeText) + '</span></div>' +
      link +
    '</div>' +
    '<div class="pin-body">' + body + '</div>' +
  '</div>';
}

function renderFieldsGrid(c) {
  return '<div class="fields-grid">' +
    labelInput(c.id, "code", "Code", c.code) +
    labelInput(c.id, "title", "Title", c.title) +
    labelInput(c.id, "faculty", "Faculty", c.faculty) +
    labelSelect(c.id, "stage", "Stage", c.stage, STAGES) +
    labelSelect(c.id, "status", "Status", c.status, STATUSES) +
    labelInput(c.id, "platform", "Platform", c.platform) +
    labelInput(c.id, "startDate", "Start date", c.startDate, "YYYY-MM-DD") +
    labelInput(c.id, "targetLaunch", "Target launch", c.targetLaunch, "YYYY-MM-DD") +
    '<div><div class="field-label">Progress: ' + (c.progress || 0) + '%</div>' +
      '<input type="range" min="0" max="100" step="1" value="' + (c.progress || 0) + '" data-action="update-field" data-course-id="' + c.id + '" data-field="progress" data-type="number" /></div>' +
  '</div>';
}

function renderSourceIds(c) {
  return '<div class="fields-grid-2">' +
    labelInput(c.id, "driveFolderId", "Drive folder ID", c.driveFolderId, "from folder URL") +
    labelInput(c.id, "canvasCourseId", "Canvas course ID", c.canvasCourseId, "number only") +
  '</div>';
}

function renderNotes(c) {
  return '<div style="margin-bottom: 14px;">' +
    '<div class="field-label">Notes</div>' +
    '<textarea class="field-textarea" rows="2" data-action="update-field" data-course-id="' + c.id + '" data-field="notes">' + esc(c.notes) + '</textarea>' +
  '</div>';
}

function renderTasks(c) {
  var head = '<div class="section-header">' +
    '<div class="section-title">Tasks</div>' +
    '<button class="btn btn-xs" data-action="add-task" data-course-id="' + c.id + '">' + svgIcon(ICONS.plus) + ' Add task</button>' +
  '</div>';

  if (c.tasks.length === 0) {
    return '<div style="margin-bottom: 10px;">' + head + '<div class="empty" style="padding: 6px 0;">No tasks yet.</div></div>';
  }

  var tasks = c.tasks.map(function (t) {
    var checkCls = t.done ? "task-check done" : "task-check";
    var textCls = t.done ? "task-text done" : "task-text";
    var icon = t.done ? ICONS.check : ICONS.circle;
    return '<div class="task">' +
      '<button class="' + checkCls + '" data-action="toggle-task" data-course-id="' + c.id + '" data-task-id="' + t.id + '">' + svgIcon(icon, "icon") + '</button>' +
      '<input class="' + textCls + '" type="text" value="' + esc(t.text) + '" data-action="update-task" data-course-id="' + c.id + '" data-task-id="' + t.id + '" data-field="text" />' +
      '<input class="task-due" type="text" value="' + esc(t.due) + '" placeholder="YYYY-MM-DD" data-action="update-task" data-course-id="' + c.id + '" data-task-id="' + t.id + '" data-field="due" />' +
      '<button class="task-delete" data-action="delete-task" data-course-id="' + c.id + '" data-task-id="' + t.id + '">' + svgIcon(ICONS.trash) + '</button>' +
    '</div>';
  }).join("");

  return '<div style="margin-bottom: 10px;">' + head + '<div class="tasks">' + tasks + '</div></div>';
}

function labelInput(courseId, field, label, value, placeholder) {
  return '<div><div class="field-label">' + esc(label) + '</div>' +
    '<input class="field-input" type="text" value="' + esc(value) + '" placeholder="' + esc(placeholder || "") + '" data-action="update-field" data-course-id="' + courseId + '" data-field="' + field + '" /></div>';
}

function labelSelect(courseId, field, label, value, options) {
  var opts = options.map(function (o) {
    return '<option value="' + esc(o) + '"' + (o === value ? " selected" : "") + '>' + esc(o) + '</option>';
  }).join("");
  return '<div><div class="field-label">' + esc(label) + '</div>' +
    '<select class="field-select" data-action="update-field" data-course-id="' + courseId + '" data-field="' + field + '">' + opts + '</select></div>';
}

// ---------- Event wiring ----------

function wireCardEvents() {
  // Header toggle (collapse/expand) — use click on whole header
  document.querySelectorAll('[data-action="toggle"]').forEach(function (el) {
    el.addEventListener("click", function () {
      var id = el.dataset.courseId;
      state.expanded[id] = !state.expanded[id];
      render();
    });
  });

  document.querySelectorAll('[data-action="set-tab"]').forEach(function (el) {
    el.addEventListener("click", function (e) {
      e.stopPropagation();
      state.activeTab[el.dataset.courseId] = el.dataset.tab;
      render();
    });
  });

  document.querySelectorAll('[data-action="refresh"]').forEach(function (el) {
    el.addEventListener("click", function (e) { e.stopPropagation(); refreshCourse(el.dataset.courseId); });
  });

  document.querySelectorAll('[data-action="toggle-config"]').forEach(function (el) {
    el.addEventListener("click", function (e) {
      e.stopPropagation();
      state.configuring[el.dataset.courseId] = !state.configuring[el.dataset.courseId];
      render();
    });
  });

  document.querySelectorAll('[data-action="update-field"]').forEach(function (el) {
    var evt = (el.tagName === "SELECT") ? "change" : "input";
    el.addEventListener(evt, function (e) {
      e.stopPropagation();
      var value = el.value;
      if (el.dataset.type === "number") value = parseInt(value, 10) || 0;
      updateField(el.dataset.courseId, el.dataset.field, value);
    });
    el.addEventListener("click", function (e) { e.stopPropagation(); });
  });

  document.querySelectorAll('[data-action="update-task"]').forEach(function (el) {
    el.addEventListener("input", function (e) {
      e.stopPropagation();
      updateTask(el.dataset.courseId, el.dataset.taskId, el.dataset.field, el.value);
    });
    el.addEventListener("click", function (e) { e.stopPropagation(); });
  });

  document.querySelectorAll('[data-action="toggle-task"]').forEach(function (el) {
    el.addEventListener("click", function (e) {
      e.stopPropagation();
      var c = state.courses.find(function (cc) { return cc.id === el.dataset.courseId; });
      if (!c) return;
      var t = c.tasks.find(function (tt) { return tt.id === el.dataset.taskId; });
      if (!t) return;
      updateTask(el.dataset.courseId, el.dataset.taskId, "done", !t.done);
    });
  });

  document.querySelectorAll('[data-action="add-task"]').forEach(function (el) {
    el.addEventListener("click", function (e) { e.stopPropagation(); addTask(el.dataset.courseId); });
  });

  document.querySelectorAll('[data-action="delete-task"]').forEach(function (el) {
    el.addEventListener("click", function (e) { e.stopPropagation(); deleteTask(el.dataset.courseId, el.dataset.taskId); });
  });

  document.querySelectorAll('[data-action="update-pin"]').forEach(function (el) {
    var evt = (el.tagName === "SELECT") ? "change" : "input";
    el.addEventListener(evt, function (e) {
      e.stopPropagation();
      updatePin(el.dataset.courseId, el.dataset.pinId, el.dataset.field, el.value);
    });
    el.addEventListener("click", function (e) { e.stopPropagation(); });
  });

  document.querySelectorAll('[data-action="add-pin"]').forEach(function (el) {
    el.addEventListener("click", function (e) { e.stopPropagation(); addPin(el.dataset.courseId); });
  });

  document.querySelectorAll('[data-action="delete-pin"]').forEach(function (el) {
    el.addEventListener("click", function (e) { e.stopPropagation(); deletePin(el.dataset.courseId, el.dataset.pinId); });
  });

  document.querySelectorAll('[data-action="delete-course"]').forEach(function (el) {
    el.addEventListener("click", function (e) { e.stopPropagation(); deleteCourse(el.dataset.courseId); });
  });
}

// ---------- Boot ----------

document.getElementById("add-course-btn").addEventListener("click", addCourse);

if (APPS_SCRIPT_URL === "https://script.google.com/macros/s/AKfycbx8nPigWR5nLl8B0I0_2tWlEE13ufeQRyyz2c6veLHL95IY4jo4653lv6O6jilQzGoQ/exec") {
  document.getElementById("courses").innerHTML =
    '<div style="padding: 2rem; text-align: center; color: var(--text-muted);">' +
      '<p style="font-size: 15px; font-weight: 500; color: var(--text);">Setup needed</p>' +
      '<p>Paste your Apps Script deployment URL into the <code>APPS_SCRIPT_URL</code> constant near the top of this file.</p>' +
      '<p style="font-size: 12px;">See SETUP.md for the full setup guide.</p>' +
    '</div>';
  setSaveStatus("error", "Not configured");
} else {
  loadCourses();
}
